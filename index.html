<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA YOUNGWOONG — Portfolio</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<script>
  // if this session already entered once, never show the hero again — land straight on the work
  if (sessionStorage.getItem('hasEntered') === '1') {
    location.replace('project.html');
  }
</script>
<link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="grain"></div>
<div class="cursor-dot" id="cursorDot"></div>

<main class="hero-main">
  <div id="prismContainer" class="prism-container"></div>
  <div class="intro-eyebrow">Portfolio — 2026</div>

  <div class="intro-photo" id="introPhoto">
    <img src="images/profile-square.jpg" alt="La Youngwoong">
  </div>

  <h1 class="intro-name" id="introName">LA YOUNGWOONG</h1>

  <a class="enter-btn" href="project.html" onclick="sessionStorage.setItem('hasEntered','1')">
    VIEW PROJECTS
    <span class="icon-wrap">
      <svg class="icon-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
      <svg class="icon-check" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg>
    </span>
  </a>
</main>

<script src="js/app.js"></script>
<script src="js/prism.js"></script>
<script>
  // 3D tilt on the profile photo, following the cursor
  (function(){
    const photo = document.getElementById('introPhoto');
    if(!photo) return;
    const strength = 18; // max degrees
    photo.addEventListener('mousemove', (e)=>{
      const rect = photo.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;  // 0..1
      const y = (e.clientY - rect.top) / rect.height;  // 0..1
      const rotY = (x - 0.5) * strength;
      const rotX = (0.5 - y) * strength;
      photo.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.05)`;
    });
    photo.addEventListener('mouseleave', ()=>{
      photo.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(1)';
    });
  })();

  // typewriter effect for the hero name
  (function(){
    const el = document.getElementById('introName');
    if(!el) return;
    const full = el.textContent.trim();
    el.textContent = '';
    el.style.borderRight = '3px solid var(--text)';
    el.style.paddingRight = '4px';
    let i = 0;
    function type(){
      if(i <= full.length){
        el.textContent = full.slice(0, i);
        i++;
        setTimeout(type, 90);
      } else {
        // keep a blinking cursor after typing finishes
        el.style.animation = 'caretBlink 1s step-end infinite';
      }
    }
    setTimeout(type, 400);
  })();
</script>
</body>
</html>
